when:
  - event: ["push", "manual"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - nix

environment:
  NIX_CONFIG: "experimental-features = nix-command flakes"

steps:
  - name: "Run checks"
    command: |
      set -euo pipefail
      nix flake check
